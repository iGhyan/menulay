AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Menu Lambda - CRUD, versioning, Redis cache, presigned URL, direct upload

Globals:
  Function:
    Runtime: python3.13
    Timeout: 29
    MemorySize: 256
    Environment:
      Variables:
        MENU_TABLE:    !Ref MenuTable
        TENANT_TABLE:  !Ref TenantTable
        S3_BUCKET:     !Ref MenuAssetsBucket
        REDIS_HOST:    !Ref RedisHost
        REDIS_PORT:    !Ref RedisPort
        REDIS_TIMEOUT: "2"
        LOG_LEVEL:     INFO
        MAX_IMAGE_MB:  "5"
        MAX_AR_MB:     "50"

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  RedisHost:
    Type: String
    Default: "localhost"

  RedisPort:
    Type: String
    Default: "6379"

Resources:
  # ── DynamoDB ──────────────────────────────────────────────────────────────
  MenuTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "MenuTable-${Environment}"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true

  TenantTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "TenantTable-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: tenantId
          AttributeType: S
      KeySchema:
        - AttributeName: tenantId
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true

  # ── S3 ────────────────────────────────────────────────────────────────────
  MenuAssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "menu-assets-${Environment}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls:       true
        BlockPublicPolicy:     true
        IgnorePublicAcls:      true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ["*"]
            MaxAge: 3600

  # ── IAM Role ──────────────────────────────────────────────────────────────
  MenuLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "menu-lambda-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: MenuLambdaPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:BatchGetItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt MenuTable.Arn
                  - !GetAtt TenantTable.Arn
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub "${MenuAssetsBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  # ── Lambda ────────────────────────────────────────────────────────────────
  MenuLambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "menu-lambda-${Environment}"
      CodeUri: src/
      Handler: handlers.router.handler
      Role: !GetAtt MenuLambdaRole.Arn
      Events:
        # ── Restaurant CRUD ──────────────────────────────────────────────
        RestaurantGetAll:
          Type: Api
          Properties:
            RestApiId: !Ref MenuApi
            Path: /menus/restaurants
            Method: GET
        RestaurantPost:
          Type: Api
          Properties:
            RestApiId: !Ref MenuApi
            Path: /menus/restaurants
            Method: POST
        RestaurantGet:
          Type: Api
          Properties:
            RestApiId: !Ref MenuApi
            Path: /menus/restaurants/{restaurantId}
            Method: GET
        RestaurantPut:
          Type: Api
          Properties:
            RestApiId: !Ref MenuApi
            Path: /menus/restaurants/{restaurantId}
            Method: PUT
        RestaurantDelete:
          Type: Api
          Properties:
            RestApiId: !Ref MenuApi
            Path: /menus/restaurants/{restaurantId}
            Method: DELETE

        # ── Category CRUD ────────────────────────────────────────────────
        CategoryRoot:
          Type: Api
          Properties:
            RestApiId: !Ref MenuApi
            Path: /menus/restaurants/{restaurantId}/categories
            Method: ANY
        CategoryProxy:
          Type: Api
          Properties:
            RestApiId: !Ref MenuApi
            Path: /menus/restaurants/{restaurantId}/categories/{proxy+}
            Method: ANY

        # ── Item CRUD ────────────────────────────────────────────────────
        ItemRoot:
          Type: Api
          Properties:
            RestApiId: !Ref MenuApi
            Path: /menus/restaurants/{restaurantId}/items
            Method: ANY
        ItemProxy:
          Type: Api
          Properties:
            RestApiId: !Ref MenuApi
            Path: /menus/restaurants/{restaurantId}/items/{proxy+}
            Method: ANY

        # ── Presigned URL ────────────────────────────────────────────────
        PresignedUrl:
          Type: Api
          Properties:
            RestApiId: !Ref MenuApi
            Path: /menus/presigned-url
            Method: POST

        # ── Direct Upload (form-data) ─────────────────────────────────────
        UploadRestaurantLogo:
          Type: Api
          Properties:
            RestApiId: !Ref MenuApi
            Path: /menus/upload/restaurants/{restaurantId}/logo
            Method: POST
        UploadCategoryImage:
          Type: Api
          Properties:
            RestApiId: !Ref MenuApi
            Path: /menus/upload/restaurants/{restaurantId}/categories/{categoryId}/image
            Method: POST
        UploadItemImage:
          Type: Api
          Properties:
            RestApiId: !Ref MenuApi
            Path: /menus/upload/restaurants/{restaurantId}/items/{itemId}/image
            Method: POST
        UploadItemArModel:
          Type: Api
          Properties:
            RestApiId: !Ref MenuApi
            Path: /menus/upload/restaurants/{restaurantId}/items/{itemId}/ar-model
            Method: POST

  # ── API Gateway ───────────────────────────────────────────────────────────
  MenuApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "menu-api-${Environment}"
      StageName: !Ref Environment
      TracingEnabled: true
      BinaryMediaTypes:
        - "multipart/form-data"
        - "image/jpeg"
        - "image/png"
        - "image/webp"
        - "model/gltf-binary"
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Tenant-Id,Authorization'"
        AllowOrigin:  "'*'"

Outputs:
  MenuApiUrl:
    Description: API Gateway base URL
    Value: !Sub "https://${MenuApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"

  MenuLambdaArn:
    Description: Lambda function ARN
    Value: !GetAtt MenuLambdaFunction.Arn

  MenuTableName:
    Description: DynamoDB menu table name
    Value: !Ref MenuTable

  TenantTableName:
    Description: DynamoDB tenant table name
    Value: !Ref TenantTable

  AssetsBucketName:
    Description: S3 assets bucket name
    Value: !Ref MenuAssetsBucket