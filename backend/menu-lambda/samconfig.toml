version = 0.1

[default]
[default.global.parameters]
stack_name = "menu-lambda-dev"
region = "ap-south-1"

[default.build.parameters]
cached   = true
parallel = true

[default.deploy.parameters]
capabilities      = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
confirm_changeset = true
resolve_s3        = true
parameter_overrides = "Environment=\"dev\" RedisHost=\"localhost\" RedisPort=\"6379\""
s3_prefix = "menu-lambda-dev"
disable_rollback = true
image_repositories = []
