AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Orders service — single Lambda for API + Step Functions

Globals:
  Function:
    Timeout: 29
    MemorySize: 256
    Runtime: python3.14
    Tracing: Active
    LoggingConfig:
      LogFormat: JSON

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
  RedisHost:
    Type: String
    Default: "localhost"
  SkipMenu:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]

Resources:

  # ── DynamoDB Tables ─────────────────────────────────────────────────────────
  OrderTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub OrderTable-${Environment}
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      AttributeDefinitions:
        - { AttributeName: PK,           AttributeType: S }
        - { AttributeName: SK,           AttributeType: S }
        - { AttributeName: restaurantId, AttributeType: S }
        - { AttributeName: placedAt,     AttributeType: S }
        - { AttributeName: tableId,      AttributeType: S }
        - { AttributeName: status,       AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: GSI-1-restaurant-orders
          KeySchema:
            - { AttributeName: restaurantId, KeyType: HASH }
            - { AttributeName: placedAt,     KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: GSI-2-table-orders
          KeySchema:
            - { AttributeName: tableId,  KeyType: HASH }
            - { AttributeName: placedAt, KeyType: RANGE }
          Projection: { ProjectionType: KEYS_ONLY }
        - IndexName: GSI-3-status-orders
          KeySchema:
            - { AttributeName: status,   KeyType: HASH }
            - { AttributeName: placedAt, KeyType: RANGE }
          Projection: { ProjectionType: KEYS_ONLY }

  MenuTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub MenuTable-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }

  # ── Step Functions Log Group ────────────────────────────────────────────────
  StateMachineLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/states/order-workflow-${Environment}
      RetentionInDays: 14

  # ── Orders Lambda ───────────────────────────────────────────────────────────
  # Deployed FIRST — no dependency on StateMachine
  OrdersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub orders-lambda-${Environment}
      CodeUri: orders_lambda/
      Handler: handler.lambda_handler
      Environment:
        Variables:
          TABLE_ORDER: !Ref OrderTable
          TABLE_MENU:  !Ref MenuTable
          STEP_ARN:    !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:order-workflow-${Environment}"
          REDIS_HOST:  !Ref RedisHost
          LOG_LEVEL:   INFO
          SKIP_MENU:   !Ref SkipMenu
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OrderTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MenuTable
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - states:StartExecution
                - states:DescribeExecution
              Resource:
                - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:order-workflow-${Environment}"
                - !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:execution:order-workflow-${Environment}:*"
      Events:
        PostOrder:
          Type: Api
          Properties:
            Path: /orders
            Method: post
        GetOrders:
          Type: Api
          Properties:
            Path: /orders
            Method: get
        PatchOrder:
          Type: Api
          Properties:
            Path: /orders/{id}
            Method: patch
        GetOrderById:
          Type: Api
          Properties:
            Path: /orders/{id}
            Method: get

  # ── Step Functions ──────────────────────────────────────────────────────────
  # Deployed AFTER Lambda — references OrdersFunction.Arn safely
  OrderStateMachine:
    Type: AWS::Serverless::StateMachine
    DependsOn: OrdersFunction
    Properties:
      Name: !Sub order-workflow-${Environment}
      DefinitionUri: statemachine/order_workflow.asl.json
      DefinitionSubstitutions:
        OrdersFunctionArn: !GetAtt OrdersFunction.Arn
      Logging:
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt StateMachineLogGroup.Arn
        Level: ALL
        IncludeExecutionData: true
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref OrdersFunction
        - CloudWatchLogsFullAccess

  # ── Application Insights ────────────────────────────────────────────────────
  ApplicationResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: !Sub ApplicationInsights-SAM-${AWS::StackName}
      ResourceQuery:
        Type: CLOUDFORMATION_STACK_1_0
  ApplicationInsightsMonitoring:
    Type: AWS::ApplicationInsights::Application
    Properties:
      ResourceGroupName: !Ref ApplicationResourceGroup
      AutoConfigurationEnabled: 'true'

Outputs:
  OrdersApi:
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/orders/"
  OrderStateMachine:
    Value: !Sub "arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:order-workflow-${Environment}"